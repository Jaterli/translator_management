services:
  # Servicio de Django (backend + frontend)
  backend:
    build: 
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: translator_backend
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - web_network
    expose:
      - "8000"  # Solo interno
    # Healthcheck opcional
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Base de datos PostgreSQL
  db:
    image: postgres:15
    container_name: translator_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - web_network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  web_network:
    external: true  # Red compartida