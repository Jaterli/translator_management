services:
  # Servicio de Django
  backend:
    build: 
      context: .
      dockerfile: docker/backend/Dockerfile
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - web_network  # Cambiado: usar red compartida
    expose:
      - "8000"  # Solo interno, no exponer al host
    # Eliminar ports: ya no es necesario

  # Base de datos PostgreSQL
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - web_network  # Cambiado: usar red compartida
    # No exponer puertos

  # NOTA: El servicio nginx se ELIMINA
  # El reverse proxy principal manejará el routing

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  web_network:
    external: true  # Usar la red compartida existente