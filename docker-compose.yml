services:
  # Backend Django API
  backend:
    build: 
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: translator_backend
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - web_network
    expose:
      - "8000"

  # Frontend React
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: translator_frontend
    restart: always
    networks:
      - web_network
    expose:
      - "80"

  # Base de datos
  db:
    image: postgres:15
    container_name: translator_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - web_network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"] 
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  web_network:
    external: true